<script>
document.querySelector("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const form = e.target;
  const data = {
    firstName: form[0].value,
    lastName: form[1].value,
    email: form[2].value,
    jobRole: form[3].value,
    address: form[4].value,
    city: form[5].value,
    pincode: form[6].value,
    date: form[7].value,
  };

  // Upload CV
  const cvFile = form[8].files[0];
  const storageRef = storage.ref('cvs/' + cvFile.name);
  await storageRef.put(cvFile);
  const cvUrl = await storageRef.getDownloadURL();
  data.cvUrl = cvUrl;

  // Store in Firestore
  await db.collection("applications").add(data);
  alert("Application submitted successfully!");
});
</script>
